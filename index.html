<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoliponguTaskNet — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon:   #00f5c4;
      --neon2:  #7b5cff;
      --neon3:  #ff3cac;
      --amber:  #ffd166;
      --bg:     #090d1a;
      --bg2:    #0f1628;
      --bg3:    #161f38;
      --border: rgba(0,245,196,0.18);
      --text:   #cde8ff;
      --muted:  #5a7da0;
    }

    html, body {
      min-height: 100vh;
      background: #05080f;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 680px;
      background: var(--bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px 32px 28px;
      position: relative;
      overflow: hidden;
    }

    /* grid background */
    .app::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* scanlines */
    .app::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
    }

    .content { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 26px; flex-wrap: wrap; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--neon);
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,245,196,0.07);
    }
    .logo-icon i { font-size: 20px; color: var(--neon); }
    .logo-title { font-size: 20px; color: var(--neon); letter-spacing: 3px; text-transform: uppercase; }
    .logo-sub   { font-size: 10px; color: var(--muted); letter-spacing: 4px; margin-top: 2px; }

    .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .stat-pill {
      padding: 4px 14px; border-radius: 20px;
      font-size: 11px; letter-spacing: 1px; border: 1px solid;
    }
    .stat-pill.total   { border-color: var(--neon2); color: var(--neon2); background: rgba(123,92,255,0.1); }
    .stat-pill.done    { border-color: var(--neon);  color: var(--neon);  background: rgba(0,245,196,0.08); }
    .stat-pill.pending { border-color: var(--neon3); color: var(--neon3); background: rgba(255,60,172,0.08); }

    /* ── Progress bar ── */
    .progress-wrap { margin-bottom: 22px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon2), var(--neon));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Input row ── */
    .input-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .task-input {
      flex: 1; min-width: 180px;
      background: var(--bg2);
      border: 1px solid rgba(0,245,196,0.22);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      letter-spacing: 0.4px;
      transition: border-color 0.2s;
    }
    .task-input::placeholder { color: var(--muted); }
    .task-input:focus { border-color: var(--neon); }

    .priority-select {
      background: var(--bg2);
      border: 1px solid rgba(0,245,196,0.22);
      border-radius: 8px;
      padding: 11px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      cursor: pointer;
      width: 110px;
    }
    .priority-select option { background: var(--bg2); }

    .add-btn {
      background: rgba(0,245,196,0.09);
      border: 1px solid var(--neon);
      color: var(--neon);
      border-radius: 8px;
      padding: 11px 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .add-btn:hover  { background: rgba(0,245,196,0.18); }
    .add-btn:active { transform: scale(0.97); }

    /* ── Filter tabs ── */
    .filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--bg3);
      color: var(--muted);
      border-radius: 20px;
      padding: 5px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.18s;
    }
    .filter-btn.active { border-color: var(--neon2); color: var(--neon2); background: rgba(123,92,255,0.1); }
    .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    /* ── Section label ── */
    .section-label {
      font-size: 10px; color: var(--muted);
      letter-spacing: 3px; margin-bottom: 12px;
    }

    /* ── Task list ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item {
      background: var(--bg2);
      border-radius: 10px;
      border: 1px solid var(--bg3);
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, opacity 0.25s;
      animation: slideIn 0.22s ease;
    }
    .task-item:hover { border-color: rgba(0,245,196,0.22); }
    .task-item.done-item { opacity: 0.45; }

    .task-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .task-check.unchecked { border-color: var(--muted); }
    .task-check.unchecked:hover { border-color: var(--neon); }
    .task-check.checked   { border-color: var(--neon); background: rgba(0,245,196,0.13); }
    .task-check.checked i { font-size: 13px; color: var(--neon); }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 13px; color: var(--text); letter-spacing: 0.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-text.striked { text-decoration: line-through; color: var(--muted); }
    .task-meta { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 1.5px; }

    .priority-badge {
      font-size: 10px; padding: 3px 9px;
      border-radius: 10px; border: 1px solid;
      letter-spacing: 1px; flex-shrink: 0;
    }
    .priority-badge.high { border-color: var(--neon3); color: var(--neon3); background: rgba(255,60,172,0.08); }
    .priority-badge.med  { border-color: var(--amber); color: var(--amber); background: rgba(255,209,102,0.08); }
    .priority-badge.low  { border-color: var(--neon2); color: var(--neon2); background: rgba(123,92,255,0.08); }

    .delete-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px;
      padding: 4px; border-radius: 6px;
      transition: color 0.15s; flex-shrink: 0;
      display: flex; align-items: center;
    }
    .delete-btn:hover { color: var(--neon3); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 48px 0;
      color: var(--muted); font-size: 12px; letter-spacing: 2px;
    }
    .empty-icon { font-size: 40px; color: var(--bg3); margin-bottom: 14px; }

    /* ── Clear-all ── */
    .footer {
      margin-top: 20px;
      display: flex; justify-content: flex-end;
    }
    .clear-btn {
      background: transparent;
      border: 1px solid rgba(255,60,172,0.3);
      color: var(--neon3); opacity: 0.7;
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }
    .clear-btn:hover { opacity: 1; background: rgba(255,60,172,0.07); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="content">

      <!-- Header -->
      <div class="header">
        <div class="logo">
          <div class="logo-icon"><i class="ti ti-brand-databricks"></i></div>
          <div>
            <div class="logo-title">PoliponguTaskNet</div>
            <div class="logo-sub">Mission Control</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat-pill total"   id="stat-total">0 TOTAL</div>
          <div class="stat-pill done"    id="stat-done">0 DONE</div>
          <div class="stat-pill pending" id="stat-pending">0 ACTIVE</div>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-label">
          <span>MISSION PROGRESS</span>
          <span id="pct-label">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-row">
        <input class="task-input" id="taskInput" type="text"
               placeholder="// enter mission objective..." maxlength="100" />
        <select class="priority-select" id="prioritySelect">
          <option value="high">🔴 HIGH</option>
          <option value="med" selected>🟡 MED</option>
          <option value="low">🔵 LOW</option>
        </select>
        <button class="add-btn" id="addBtn">
          <i class="ti ti-plus"></i> ADD
        </button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">ALL</button>
        <button class="filter-btn" data-filter="active">ACTIVE</button>
        <button class="filter-btn" data-filter="done">COMPLETED</button>
        <button class="filter-btn" data-filter="high">HIGH</button>
        <button class="filter-btn" data-filter="med">MEDIUM</button>
        <button class="filter-btn" data-filter="low">LOW</button>
      </div>

      <!-- List -->
      <div class="section-label">[ MISSION LOG ]</div>
      <div class="task-list" id="taskList"></div>

      <!-- Footer -->
      <div class="footer">
        <button class="clear-btn" id="clearBtn">
          <i class="ti ti-trash"></i> CLEAR COMPLETED
        </button>
      </div>

    </div>
  </div>

  <script>
    let tasks = [
      { id: 1, text: 'Initialize project framework',       priority: 'high', done: false, ts: '09:41' },
      { id: 2, text: 'Configure neural API endpoints',     priority: 'med',  done: false, ts: '09:42' },
      { id: 3, text: 'Deploy subsystem diagnostics',       priority: 'low',  done: true,  ts: '09:43' },
    ];
    let nextId = 4;
    let filter = 'all';

    function pad(n) { return String(n).padStart(2, '0'); }
    function now() {
      const d = new Date();
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function filteredTasks() {
      return tasks.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done')   return  t.done;
        if (filter === 'high')   return t.priority === 'high';
        if (filter === 'med')    return t.priority === 'med';
        if (filter === 'low')    return t.priority === 'low';
        return true;
      });
    }

    function render() {
      const total   = tasks.length;
      const done    = tasks.filter(t => t.done).length;
      const active  = total - done;
      const pct     = total ? Math.round(done / total * 100) : 0;

      document.getElementById('stat-total').textContent   = total  + ' TOTAL';
      document.getElementById('stat-done').textContent    = done   + ' DONE';
      document.getElementById('stat-pending').textContent = active + ' ACTIVE';
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('pct-label').textContent    = pct + '%';

      const list = filteredTasks();
      const el   = document.getElementById('taskList');

      if (list.length === 0) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="ti ti-radio-off"></i></div>
            NO SIGNALS DETECTED
          </div>`;
        return;
      }

      el.innerHTML = list.map(t => `
        <div class="task-item ${t.done ? 'done-item' : ''}" data-id="${t.id}">
          <div class="task-check ${t.done ? 'checked' : 'unchecked'}"
               onclick="toggle(${t.id})"
               role="checkbox" aria-checked="${t.done}" tabindex="0"
               onkeydown="if(event.key==='Enter'||event.key===' ')toggle(${t.id})">
            ${t.done ? '<i class="ti ti-check"></i>' : ''}
          </div>
          <div class="task-body">
            <div class="task-text ${t.done ? 'striked' : ''}">${escape(t.text)}</div>
            <div class="task-meta">SYS_TIME ${t.ts}</div>
          </div>
          <span class="priority-badge ${t.priority}">${t.priority.toUpperCase()}</span>
          <button class="delete-btn" onclick="remove(${t.id})" aria-label="Delete task">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      `).join('');
    }

    function escape(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text  = input.value.trim();
      if (!text) { input.focus(); return; }
      const priority = document.getElementById('prioritySelect').value;
      tasks.unshift({ id: nextId++, text, priority, done: false, ts: now() });
      input.value = '';
      render();
    }

    function toggle(id) {
      const t = tasks.find(x => x.id === id);
      if (t) t.done = !t.done;
      render();
    }

    function remove(id) {
      tasks = tasks.filter(x => x.id !== id);
      render();
    }

    document.getElementById('addBtn').onclick = addTask;
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    document.getElementById('clearBtn').onclick = () => {
      tasks = tasks.filter(t => !t.done);
      render();
    };
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
    });

    render();
  </script>
</body>
</html>
